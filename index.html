    <!-- SCRIPT DE EVENTOS META PIXEL -->
    <script>
    (function() {
      if (!window.fbq) {
        console.warn('⚠️ fbq no disponible');
        return;
      }

      const executePixelEvents = function() {
        if (!window.fbq) return;

        // Evento: ViewContent
        fbq('track', 'ViewContent', {
          content_name: 'ROZ Social Media Landing Page',
          content_type: 'website',
          value: 0,
          currency: 'COP'
        });

        // Evento: Lead (WhatsApp)
        const whatsappLinks = document.querySelectorAll('a[href*="wa.me"]');
        whatsappLinks.forEach((link) => {
          link.removeEventListener('click', handleWhatsAppClick);
          link.addEventListener('click', handleWhatsAppClick);
        });

        // Evento: Contact
        const contactLinks = document.querySelectorAll('a[href*="#contacto"]');
        contactLinks.forEach(link => {
          link.removeEventListener('click', handleContactClick);
          link.addEventListener('click', handleContactClick);
        });
      };

      const handleWhatsAppClick = function(e) {
        fbq('track', 'Lead', {
          content_name: 'ROZ - Consulta por WhatsApp',
          currency: 'COP',
          value: 0
        });
      };

      const handleContactClick = function(e) {
        fbq('track', 'Contact', {
          content_name: 'ROZ - Formulario de Contacto',
          currency: 'COP'
        });
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', executePixelEvents);
      } else {
        executePixelEvents();
      }

      setTimeout(executePixelEvents, 500);
      setTimeout(executePixelEvents, 2000);

      window.pixelEventsActive = true;
    })();
    </script>
