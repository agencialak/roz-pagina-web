    <!-- Meta Pixel Events - Solución Robusta -->
    <script>
    (function() {
      // Función para inicializar eventos (se ejecuta inmediatamente y también cuando el React App esté listo)
      function initializeMetaPixelEvents() {
        // 1️⃣ EVENTO: ViewContent (cuando alguien visita la página)
        if (typeof fbq !== 'undefined') {
          fbq('track', 'ViewContent', {
            content_name: 'ROZ Social Media - Agencia Digital',
            content_type: 'website',
            value: 0,
            currency: 'COP'
          });
          console.log('✅ ViewContent disparado');
        }

        // 2️⃣ EVENTO: Lead (cuando hace clic en WhatsApp)
        const whatsappLinks = document.querySelectorAll('a[href*="wa.me"]');
        whatsappLinks.forEach(link => {
          // Remover listeners antiguos si existen
          link.removeEventListener('click', whatsappClickHandler);
          // Agregar nuevo listener
          link.addEventListener('click', whatsappClickHandler);
        });

        // 3️⃣ EVENTO: Contacto (cuando hace clic en contacto)
        const contactButtons = document.querySelectorAll('a[href*="#contacto"]');
        contactButtons.forEach(btn => {
          // Remover listeners antiguos si existen
          btn.removeEventListener('click', contactClickHandler);
          // Agregar nuevo listener
          btn.addEventListener('click', contactClickHandler);
        });
      }

      // Handler para WhatsApp
      function whatsappClickHandler(e) {
        if (typeof fbq !== 'undefined') {
          fbq('track', 'Lead', {
            content_name: 'Consulta - ROZ Social Media',
            currency: 'COP',
            value: 0
          });
          console.log('✅ Evento Lead (WhatsApp) registrado');
        }
      }

      // Handler para Contacto
      function contactClickHandler() {
        if (typeof fbq !== 'undefined') {
          fbq('track', 'Contact', {
            content_name: 'Formulario de contacto',
            currency: 'COP'
          });
          console.log('✅ Evento Contact registrado');
        }
      }

      // Ejecutar inmediatamente si el DOM está listo
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeMetaPixelEvents);
      } else {
        // Si el DOM ya está listo, ejecutar inmediatamente
        initializeMetaPixelEvents();
      }

      // También ejecutar después de un pequeño delay para capturar elementos cargados dinámicamente
      setTimeout(initializeMetaPixelEvents, 500);
      setTimeout(initializeMetaPixelEvents, 2000);
    })();
    </script>
